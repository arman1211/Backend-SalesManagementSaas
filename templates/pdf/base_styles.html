<style>

    font-size: 9.5pt;
    line-height: 1.5;
    color: #222222;

  /* Header */
  .header-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #cccccc;
  }
  .header-table td {
    vertical-align: top;
    padding: 0;
  }
  .header-left { width: 60%; }
  .header-right { width: 40%; text-align: right; }

  .logo {
    max-height: 28px;
    max-width: 72px;
    margin-bottom: 6px;
  }
  .company-name {
    font-size: 11pt;
    font-weight: bold;
    color: #111111;
    margin-bottom: 4px;
  }
  .company-detail {
    font-size: 8.5pt;
    color: #555555;
    line-height: 1.45;
  }

  .doc-title {
    font-size: 14pt;
    font-weight: bold;
    color: #111111;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }
  .doc-meta-table {
    width: 100%;
    border-collapse: collapse;
  }
  .doc-meta-table td {
    padding: 1px 0;
    font-size: 9pt;
    text-align: right;
    color: #333333;
  }
  .doc-meta-table .meta-label {
    color: #666666;
    padding-right: 10px;
  }
  .doc-meta-table .meta-value {
    font-weight: bold;
    color: #111111;
  }

  .meta-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
  }
  .meta-table td {
    vertical-align: top;
    width: 50%;
    padding: 0;
    font-size: 9pt;
    line-height: 1.5;
  }
  .meta-right { text-align: right; }

  .label {
    font-size: 7.5pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #666666;
    margin-bottom: 5px;
  }

    font-size: 10pt;
    font-weight: bold;
    color: #111111;
    margin-bottom: 3px;
  }
  .meta-line {
    margin-bottom: 2px;
    color: #333333;
  }
  .meta-line .lbl {
    color: #666666;
  }

  .items-table {

    margin-bottom: 16px;

    color: #666666;

    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
  }

    width: 42%;
    border-collapse: collapse;

    padding: 3px 0;

    white-space: nowrap;
    padding-left: 16px;

    color: #111111;

    padding-top: 6px;

    color: #111111;

    font-size: 8.5pt;
    color: #666666;
    border-top: 1px solid #aaaaaa;
  }
  .signature-table .spacer {
    width: 16%;
    border-top: none;
    padding: 0;
  }
